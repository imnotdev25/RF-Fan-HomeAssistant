# ═══════════════════════════════════════════════════════════════════════════
#  Smitch B22 RGBCCT Bulb — Lovelace Card
#
#  Sections:
#    • Power toggle
#    • Colour — inline HA light card (RGB wheel + brightness)
#    • White — CT slider (warm ↔ cool) + preset buttons
#    • Quick Colours — RGB presets
#    • Effects — Tasmota schemes
#
#  All buttons dim + disable when entity is unavailable/unknown.
#
#  Requires (HACS → Frontend):
#    • custom:button-card   (RomRider)
#    • custom:layout-card   (thomasloven)
#    • card-mod             (thomasloven)
# ═══════════════════════════════════════════════════════════════════════════

type: custom:vertical-stack-in-card
card_mod:
  style: |
    ha-card {
      background: linear-gradient(160deg, #0f172a 0%, #0d1424 60%, #0a0f1e 100%) !important;
      border: 1px solid rgba(250,204,21,0.18) !important;
      border-radius: 20px !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5) !important;
      padding: 4px 4px 10px !important;
    }
cards:

  # ── Section label: Power ──────────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    name: "Smitch Bulb"
    show_name: true
    show_icon: false
    styles:
      card:
        - background: "transparent"
        - box-shadow: "none"
        - border: "none"
        - padding: "8px 14px 4px"
        - height: "auto"
      grid:
        - grid-template-areas: '"n"'
      name:
        - font-size: "0.6rem"
        - font-weight: "800"
        - letter-spacing: "0.12em"
        - text-transform: "uppercase"
        - color: "#facc15"
        - font-family: "monospace"
        - justify-self: "start"
        - border-left: "3px solid #facc15"
        - padding-left: "8px"
    tap_action:
      action: none

  # ── Power ─────────────────────────────────────────────────────────────────
  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr 1fr
      gap: 6px
      padding: 0 10px 4px
    cards:

      - type: custom:button-card
        entity: light.smitch_bulb
        name: Power
        icon: mdi:power
        show_name: true
        show_icon: true
        state:
          - value: "on"
            styles:
              card:
                - background: "rgba(250,204,21,0.2)"
                - border: "1px solid rgba(250,204,21,0.6)"
                - box-shadow: "0 0 14px rgba(250,204,21,0.3)"
              icon:
                - color: "#facc15"
              name:
                - color: "#facc15"
            tap_action:
              action: toggle
          - value: "off"
            styles:
              card:
                - background: "rgba(250,204,21,0.06)"
                - border: "1px solid rgba(250,204,21,0.2)"
              icon:
                - color: "#78716c"
              name:
                - color: "#94a3b8"
            tap_action:
              action: toggle
          - value: "unavailable"
            styles:
              card:
                - background: "rgba(255,255,255,0.03)"
                - border: "1px solid rgba(255,255,255,0.06)"
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
          - value: "unknown"
            styles:
              card:
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
        styles:
          card:
            - background: "rgba(250,204,21,0.06)"
            - border: "1px solid rgba(250,204,21,0.2)"
            - border-radius: "12px"
            - padding: "14px 8px"
            - transition: "all 0.2s ease"
          icon:
            - color: "#facc15"
            - width: "26px"
          name:
            - color: "#a0aec0"
            - font-size: "0.6rem"
            - font-weight: "700"
            - letter-spacing: "0.1em"
            - text-transform: "uppercase"
            - font-family: "monospace"
            - margin-top: "6px"

      - type: custom:button-card
        entity: light.smitch_bulb
        name: Colour
        icon: mdi:palette
        show_name: true
        show_icon: true
        state:
          - value: "on"
            styles:
              card:
                - background: "rgba(250,204,21,0.2)"
                - border: "1px solid rgba(250,204,21,0.6)"
                - box-shadow: "0 0 14px rgba(250,204,21,0.3)"
              icon:
                - color: "#facc15"
              name:
                - color: "#facc15"
          - value: "off"
            styles:
              card:
                - background: "rgba(250,204,21,0.06)"
                - border: "1px solid rgba(250,204,21,0.2)"
              icon:
                - color: "#78716c"
              name:
                - color: "#94a3b8"
          - value: "unavailable"
            styles:
              card:
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
          - value: "unknown"
            styles:
              card:
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
        styles:
          card:
            - background: "rgba(250,204,21,0.06)"
            - border: "1px solid rgba(250,204,21,0.2)"
            - border-radius: "12px"
            - padding: "14px 8px"
            - transition: "all 0.2s ease"
          icon:
            - color: "#facc15"
            - width: "26px"
          name:
            - color: "#a0aec0"
            - font-size: "0.6rem"
            - font-weight: "700"
            - letter-spacing: "0.1em"
            - text-transform: "uppercase"
            - font-family: "monospace"
            - margin-top: "6px"
        tap_action:
          action: more-info

