# ═══════════════════════════════════════════════════════════════════════════
#  Tasmota RGB Light — Lovelace Card
#
#  Matches the dark aesthetic of the RF Fans card.
#  Add via: Dashboard → Edit → Add Card → Manual → paste this YAML
#
#  When entity is unavailable: all buttons dim + become non-clickable.
#  When entity comes online: full colour + interaction restored automatically.
#
#  Requires (HACS → Frontend):
#    • custom:button-card   (RomRider)
#    • custom:layout-card   (thomasloven)
#    • card-mod             (thomasloven)
# ═══════════════════════════════════════════════════════════════════════════

type: custom:vertical-stack-in-card
card_mod:
  style: |
    ha-card {
      background: linear-gradient(160deg, #0f172a 0%, #0d1424 60%, #0a0f1e 100%) !important;
      border: 1px solid rgba(251,191,36,0.18) !important;
      border-radius: 20px !important;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 16px 40px rgba(0,0,0,0.5),
        0 0 60px rgba(251,191,36,0.06) !important;
      padding: 4px 4px 8px !important;
    }
cards:

  # ── Header ───────────────────────────────────────────────────────────────
  - type: markdown
    content: |
      <div style="display:flex;align-items:center;gap:12px;padding:14px 14px 8px;">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.25);display:flex;align-items:center;justify-content:center;">
          <ha-icon icon="mdi:lightbulb-on" style="color:#fbbf24;--mdi-icon-size:20px;"></ha-icon>
        </div>
        <div>
          <div style="font-size:1rem;font-weight:800;color:#e2e8f0;letter-spacing:-0.01em;font-family:'DM Sans',sans-serif;">RGB Light</div>
          <div style="font-size:0.6rem;color:#475569;letter-spacing:0.08em;text-transform:uppercase;font-family:monospace;">Tasmota · MQTT</div>
        </div>
      </div>
    card_mod:
      style: |
        ha-card { background: transparent !important; box-shadow: none !important; border: none !important; padding: 0 !important; }

  # ── Section label: Controls ───────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    styles:
      card:
        - background: "transparent"
        - box-shadow: "none"
        - border: "none"
        - padding: "8px 14px 4px"
        - height: "auto"
      grid:
        - grid-template-areas: '"n"'
      name:
        - font-size: "0.6rem"
        - font-weight: "800"
        - letter-spacing: "0.12em"
        - text-transform: "uppercase"
        - color: "#fbbf24"
        - font-family: "monospace"
        - justify-self: "start"
        - border-left: "3px solid #fbbf24"
        - padding-left: "8px"
    name: "Controls"
    show_icon: false
    show_name: true

  # ── Power toggle ──────────────────────────────────────────────────────────
  - type: custom:button-card
    entity: light.rgb_light
    name: Power
    icon: mdi:power
    show_name: true
    show_icon: true
    show_state: true
    state:
      - value: "on"
        styles:
          card:
            - background: "rgba(251,191,36,0.2)"
            - border: "1px solid rgba(251,191,36,0.6)"
            - box-shadow: "0 0 16px rgba(251,191,36,0.3)"
            - cursor: "pointer"
            - opacity: "1"
          icon:
            - color: "#fbbf24"
            - filter: "drop-shadow(0 0 6px rgba(251,191,36,0.6))"
          name:
            - color: "#fbbf24"
          state:
            - color: "#fbbf24"
        tap_action:
          action: toggle
      - value: "off"
        styles:
          card:
            - background: "rgba(251,191,36,0.06)"
            - border: "1px solid rgba(251,191,36,0.2)"
            - cursor: "pointer"
            - opacity: "1"
          icon:
            - color: "#78716c"
          name:
            - color: "#94a3b8"
          state:
            - color: "#475569"
        tap_action:
          action: toggle
      - value: "unavailable"
        styles:
          card:
            - background: "rgba(255,255,255,0.03)"
            - border: "1px solid rgba(255,255,255,0.06)"
            - opacity: "0.4"
            - cursor: "not-allowed"
          icon:
            - color: "#475569"
          name:
            - color: "#475569"
          state:
            - color: "#334155"
        tap_action:
          action: none
      - value: "unknown"
        styles:
          card:
            - background: "rgba(255,255,255,0.03)"
            - border: "1px solid rgba(255,255,255,0.06)"
            - opacity: "0.4"
            - cursor: "not-allowed"
          icon:
            - color: "#475569"
          name:
            - color: "#475569"
        tap_action:
          action: none
    styles:
      card:
        - border-radius: "12px"
        - padding: "14px 8px"
        - margin: "0 10px 4px"
        - transition: "all 0.2s ease"
      icon:
        - width: "26px"
      name:
        - font-size: "0.6rem"
        - font-weight: "700"
        - letter-spacing: "0.1em"
        - text-transform: "uppercase"
        - font-family: "monospace"
        - margin-top: "6px"
      state:
        - font-size: "0.55rem"
        - color: "#475569"
        - text-transform: "uppercase"
        - margin-top: "2px"

  # ── Section label: Colour ─────────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    styles:
      card:
        - background: "transparent"
        - box-shadow: "none"
        - border: "none"
        - padding: "8px 14px 4px"
        - height: "auto"
