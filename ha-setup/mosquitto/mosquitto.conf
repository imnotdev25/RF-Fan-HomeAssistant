# ─────────────────────────────────────────────
#  Mosquitto MQTT Broker Configuration
# ─────────────────────────────────────────────

# ── MQTT Listener (plain) ─────────────────────
listener 1883
protocol mqtt

# ── WebSocket Listener ────────────────────────
listener 9001
protocol websockets

# ── Authentication (OPTIONAL) ─────────────────
# By default, anonymous connections are allowed.
# To enable username/password authentication:
#   1. Run: ./scripts/create-mqtt-user.sh
#   2. Comment out `allow_anonymous true` below
#   3. Uncomment the `password_file` line
#   4. Restart the mosquitto container

allow_anonymous true
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Connection limits ─────────────────────────
max_connections -1
max_queued_messages 1000