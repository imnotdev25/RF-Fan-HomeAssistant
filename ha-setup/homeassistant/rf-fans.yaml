# ═══════════════════════════════════════════════════════════════════════════
#  RF Fans — Beautiful Lovelace Card
#
#  Design: Dark industrial · colour-coded sections · glow accents
#    🔵 Blue/Purple  — Power & Light per fan
#    🟢 Green        — Speeds 1–7
#    🟠 Amber        — Modes (Reverse / Smart / Natural)
#    🔴 Red          — Timers
#
#  Requires (HACS → Frontend):
#    • custom:button-card          (RomRider)
#    • custom:layout-card          (thomasloven)
#    • custom:vertical-stack-in-card  (ofekashery)
#    • card-mod                    (thomasloven) ← for card background styling
#
#  Add to dashboard:
#    Edit → Add Card → Manual → paste this YAML
# ═══════════════════════════════════════════════════════════════════════════

type: vertical-stack
cards:

  # ════════════════════════════════════════════════════════════════════════
  #  LIVING ROOM FAN  (accent: #38bdf8 sky blue)
  # ════════════════════════════════════════════════════════════════════════
  - type: custom:vertical-stack-in-card
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(160deg, #0f172a 0%, #0d1424 60%, #0a0f1e 100%) !important;
          border: 1px solid rgba(56,189,248,0.18) !important;
          border-radius: 20px !important;
          box-shadow:
            0 0 0 1px rgba(255,255,255,0.04),
            0 16px 40px rgba(0,0,0,0.5),
            0 0 60px rgba(56,189,248,0.06) !important;
          padding: 4px 4px 8px !important;
        }
    cards:

      # ── Fan Header ─────────────────────────────────────────────────────
      - type: markdown
        content: |
          <div style="display:flex;align-items:center;gap:12px;padding:14px 14px 8px;">
            <div style="width:36px;height:36px;border-radius:10px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.25);display:flex;align-items:center;justify-content:center;font-size:18px;">🌀</div>
            <div>
              <div style="font-size:1rem;font-weight:800;color:#e2e8f0;letter-spacing:-0.01em;font-family:'DM Sans',sans-serif;">Living Room</div>
              <div style="font-size:0.6rem;color:#475569;letter-spacing:0.08em;text-transform:uppercase;font-family:monospace;">RF Fan Controller</div>
            </div>
          </div>
        card_mod:
          style: |
            ha-card { background: transparent !important; box-shadow: none !important; border: none !important; padding: 0 !important; }

      # ── Section: Main Controls ──────────────────────────────────────────
      - type: markdown
        content: "<div style='display:flex;align-items:center;gap:8px;padding:4px 14px 6px;'><div style='width:3px;height:12px;border-radius:2px;background:#38bdf8;box-shadow:0 0 8px #38bdf8;'></div><span style='font-size:0.58rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#475569;font-family:monospace;'>Main Controls</span></div>"
        card_mod:
          style: |
            ha-card { background: transparent !important; box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important; }

      - type: custom:layout-card
        layout_type: grid
        layout:
          grid-template-columns: 1fr 1fr
          gap: 6px
          padding: 0 10px 4px
        cards:
          - type: custom:button-card
            name: Power
            icon: mdi:power
            show_name: true
            show_icon: true
            styles:
              card:
                - background: "rgba(56,189,248,0.06)"
                - border: "1px solid rgba(56,189,248,0.2)"
                - border-radius: "12px"
                - padding: "14px 8px"
                - box-shadow: "0 2px 12px rgba(0,0,0,0.4)"
                - transition: "all 0.2s cubic-bezier(.4,0,.2,1)"
              icon:
                - color: "#38bdf8"
                - width: "26px"
                - filter: "drop-shadow(0 0 4px rgba(56,189,248,0.5))"
              name:
                - color: "#94a3b8"
                - font-size: "0.6rem"
                - font-weight: "700"
                - letter-spacing: "0.1em"
                - text-transform: "uppercase"
                - font-family: "'DM Mono', monospace"
                - margin-top: "6px"
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.living_room_fan_power

          - type: custom:button-card
            name: Light
            icon: mdi:lightbulb
            show_name: true
            show_icon: true
            styles:
              card:
                - background: "rgba(56,189,248,0.06)"
                - border: "1px solid rgba(56,189,248,0.2)"
                - border-radius: "12px"
                - padding: "14px 8px"
                - box-shadow: "0 2px 12px rgba(0,0,0,0.4)"
                - transition: "all 0.2s cubic-bezier(.4,0,.2,1)"
              icon:
                - color: "#38bdf8"
                - width: "26px"
                - filter: "drop-shadow(0 0 4px rgba(56,189,248,0.5))"
              name:
                - color: "#94a3b8"
                - font-size: "0.6rem"
                - font-weight: "700"
                - letter-spacing: "0.1em"
                - text-transform: "uppercase"
                - font-family: "'DM Mono', monospace"
                - margin-top: "6px"
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.living_room_fan_light

