# ═══════════════════════════════════════════════════════════════════════════
#  RF Fans — Lovelace Dashboard Card
#
#  Requires (install via HACS → Frontend):
#    • custom:button-card    (by RomRider)
#    • custom:layout-card    (by thomasloven)
#    • custom:vertical-stack-in-card  (by ofekashery)  ← optional, for title
#
#  Usage:
#    Dashboard → Edit → Add Card → Manual → paste this YAML
#
#  Layout per fan row:
#    [ Fan Label ] [ Power ] [ Light ] [ 1 ][ 2 ][ 3 ][ 4 ][ 5 ][ 6 ][ 7 ] [ Rev ] [ Smart ] [ Natural ] [ ⏱Off ][ ⏱2H ][ ⏱4H ][ ⏱8H ]
#
#  Split into 3 rows per fan for readability:
#    Row 1 — Power + Light + Speeds 1-7
#    Row 2 — Reverse + Smart + Natural
#    Row 3 — Timers
# ═══════════════════════════════════════════════════════════════════════════

# ── Shared button-card style templates (add to your button_card_templates
#    section in lovelace yaml, or inline as shown below) ─────────────────
#
# Each button uses the same compact style — icon + name below it, auto color
# ─────────────────────────────────────────────────────────────────────────

type: vertical-stack
cards:

  # ════════════════════════════════════════════════════════════════════════
  #  LIVING ROOM FAN
  # ════════════════════════════════════════════════════════════════════════
  - type: custom:vertical-stack-in-card
    title: Living Room Fan
    cards:

      # ── Row 1: Power · Light · Speeds ─────────────────────────────────
      - type: custom:layout-card
        layout_type: grid
        layout:
          grid-template-columns: repeat(9, 1fr)
          place-items: stretch stretch
          gap: 4px
        cards:

          - type: custom:button-card
            name: Power
            icon: mdi:fan
            show_name: true
            show_icon: true
            color: auto
            styles:
              card:
                - border-radius: 8px
                - padding: 8px 4px
              name:
                - font-size: 60%
                - margin-top: 4px
              icon:
                - width: 24px
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.living_room_fan_power

