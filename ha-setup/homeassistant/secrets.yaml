# ─────────────────────────────────────────────
#  Home Assistant — secrets.yaml
#  Keep this file private and out of version control!
# ─────────────────────────────────────────────

# PostgreSQL recorder connection string
# Format: postgresql://user:password@host:port/dbname
recorder_db_url: "postgresql://homeassistant:CHANGE_ME@localhost:5432/homeassistant"

# HomeKit bridge advertise IP (LAN IP of your Docker host)
homekit_advertise_ip: "192.168.1.100"

# Logto OIDC credentials (fill after configuring in Logto Admin)
logto_client_id: "your_ha_client_id"
logto_client_secret: "your_ha_client_secret"

# MQTT credentials (optional — only if you enabled mosquitto auth)
# mqtt_username: "mqtt_user"
# mqtt_password: "mqtt_password"