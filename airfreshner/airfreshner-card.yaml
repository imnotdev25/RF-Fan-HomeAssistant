type: custom:vertical-stack-in-card
card_mod:
  style: |
    ha-card {
      background: linear-gradient(160deg, #0f172a 0%, #0d1424 60%, #0a0f1e 100%) !important;
      border: 1px solid rgba(134,239,172,0.18) !important;
      border-radius: 20px !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5) !important;
      padding: 4px 4px 10px !important;
    }
cards:

  # ── Section label ─────────────────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    name: "Aer Matic"
    show_name: true
    show_icon: false
    styles:
      card:
        - background: "transparent"
        - box-shadow: "none"
        - border: "none"
        - padding: "8px 14px 4px"
        - height: "auto"
      grid:
        - grid-template-areas: '"n"'
      name:
        - font-size: "0.6rem"
        - font-weight: "800"
        - letter-spacing: "0.12em"
        - text-transform: "uppercase"
        - color: "#86efac"
        - font-family: "monospace"
        - justify-self: "start"
        - border-left: "3px solid #86efac"
        - padding-left: "8px"
    tap_action:
      action: none

  # ── Spray ─────────────────────────────────────────────────────────────────
  - type: custom:layout-card
    layout_type: grid
    layout:
      grid-template-columns: 1fr
      gap: 6px
      padding: 0 10px 4px
    cards:
      - type: custom:button-card
        entity: switch.aer_matic_spray
        name: Spray Now
        icon: mdi:spray
        show_name: true
        show_icon: true
        state:
          - value: "on"
            name: Spraying…
            styles:
              card:
                - background: "rgba(134,239,172,0.2)"
                - border: "1px solid rgba(134,239,172,0.6)"
                - box-shadow: "0 0 14px rgba(134,239,172,0.3)"
              icon:
                - color: "#86efac"
              name:
                - color: "#86efac"
            tap_action:
              action: none
          - value: "unavailable"
            name: Sleeping…
            styles:
              card:
                - background: "rgba(255,255,255,0.03)"
                - border: "1px solid rgba(255,255,255,0.06)"
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
          - value: "unknown"
            name: Waking…
            styles:
              card:
                - background: "rgba(255,255,255,0.03)"
                - border: "1px solid rgba(255,255,255,0.06)"
                - opacity: "0.4"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#475569"
            tap_action:
              action: none
        styles:
          card:
            - background: "rgba(134,239,172,0.06)"
            - border: "1px solid rgba(134,239,172,0.2)"
            - border-radius: "12px"
            - padding: "14px 8px"
            - transition: "all 0.2s ease"
          icon:
            - color: "#86efac"
            - width: "26px"
          name:
            - color: "#a0aec0"
            - font-size: "0.6rem"
            - font-weight: "700"
            - letter-spacing: "0.1em"
            - text-transform: "uppercase"
            - font-family: "monospace"
            - margin-top: "6px"
        tap_action:
          action: call-service
          service: switch.turn_on
          service_data:
            entity_id: switch.aer_matic_spray

  # ── Section label ─────────────────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    name: "Battery & Signal"
    show_name: true
    show_icon: false
    styles:
      card:
        - background: "transparent"
        - box-shadow: "none"
        - border: "none"
        - padding: "8px 14px 4px"
        - height: "auto"
      grid:
        - grid-template-areas: '"n"'
      name:
        - font-size: "0.6rem"
        - font-weight: "800"
        - letter-spacing: "0.12em"
        - text-transform: "uppercase"
        - color: "#fbbf24"
        - font-family: "monospace"
        - justify-self: "start"
        - border-left: "3px solid #fbbf24"
        - padding-left: "8px"
    tap_action:
      action: none

  # ── Aer Battery · ESP Battery · RSSI ─────────────────────────────────────
