            - padding: "14px 8px"
            - cursor: "default"
          icon:
            - color: "#a78bfa"
            - width: "26px"
          name:
            - color: "#a0aec0"
            - font-size: "0.6rem"
            - font-weight: "700"
            - letter-spacing: "0.1em"
            - text-transform: "uppercase"
            - font-family: "monospace"
            - margin-top: "6px"
          state:
            - color: "#a78bfa"
            - font-size: "0.9rem"
            - font-weight: "800"
            - font-family: "monospace"
            - margin-top: "2px"
        tap_action:
          action: none

  # ── Section label ─────────────────────────────────────────────────────────
  - type: custom:button-card
    color_type: blank-card
    name: "Diagnostics"
    show_name: true
    show_icon: false
    styles:
      card:
        - background: "transparent"
