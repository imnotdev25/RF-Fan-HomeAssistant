    layout_type: grid
    layout:
      grid-template-columns: repeat(3, 1fr)
      gap: 6px
      padding: 0 10px 4px
    cards:

      - type: custom:button-card
        entity: sensor.aer_matic_battery_level
        name: Aer Bat
        icon: mdi:battery-bluetooth
        show_name: true
        show_icon: true
        show_state: true
        state:
          - value: "unavailable"
            styles:
              card:
                - opacity: "0.35"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
              name:
                - color: "#334155"
              state:
                - color: "#334155"
            tap_action:
              action: none
          - value: "unknown"
            styles:
              card:
                - opacity: "0.35"
                - cursor: "not-allowed"
              icon:
                - color: "#334155"
            tap_action:
              action: none
        styles:
          card:
            - background: "rgba(251,191,36,0.06)"
            - border: "1px solid rgba(251,191,36,0.2)"
            - border-radius: "12px"
            - padding: "14px 8px"
            - cursor: "default"
          icon:
            - color: "#fbbf24"
            - width: "26px"
          name:
            - color: "#a0aec0"
            - font-size: "0.6rem"
            - font-weight: "700"
            - letter-spacing: "0.1em"
            - text-transform: "uppercase"
            - font-family: "monospace"
            - margin-top: "6px"
          state:
            - color: "#fbbf24"
            - font-size: "0.9rem"
            - font-weight: "800"
            - font-family: "monospace"
            - margin-top: "2px"
        tap_action:
          action: none

      - type: custom:button-card
